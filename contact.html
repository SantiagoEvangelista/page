<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vispo</title>
    <meta name="description" content="Get in touch with Vispo Systems.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <header class="site-header">
            <a href="index.html" class="brand">
                <img src="logoNoText.png" alt="Vispo Systems" class="brand-mark">
                <span class="brand-name">Vispo Systems</span>
            </a>
            <nav class="site-nav" aria-label="Primary">
                <a href="contact.html" class="is-active">Contact</a>
                <a href="careers.html">Careers</a>
            </nav>
        </header>

        <section class="hero hero-page" aria-labelledby="contact-title">
            <h1 id="contact-title">Contact</h1>
            <p class="lead">Inquiries, partnerships, or other.</p>

            <form
                class="contact-form"
                id="contactForm"
                action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfQfUsfEh8feGumwTAU2pby9ZBuJSI1ijVr0_Ue5-MOHNaxeQ/formResponse"
                method="post"
            >
                <div class="form-row">
                    <label class="form-field">
                        <span class="field-label">Name</span>
                        <input class="form-input" type="text" name="entry.606404527" autocomplete="name" required>
                    </label>
                    <label class="form-field">
                        <span class="field-label">Email</span>
                        <input class="form-input" type="email" name="entry.70364591" autocomplete="email" required>
                    </label>
                </div>
                <label class="form-field">
                    <span class="field-label">Message</span>
                    <textarea class="form-input form-textarea" name="entry.1391374769" rows="6" required></textarea>
                </label>
                <div class="form-actions">
                    <button class="button-link" type="submit">Send</button>
                    <p class="form-status" id="contactStatus" aria-live="polite"></p>
                </div>
            </form>
        </section>

        <footer class="site-footer">
            <p>&copy; 2026 Vispo Systems</p>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
